services:
  - type: web
    name: paginadetestes-backend
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_OAUTH_SCOPES
        value: openid profile email https://www.googleapis.com/auth/calendar

  - type: web
    name: paginadetestes-frontend
    env: node
    rootDir: frontend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
